name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Installer docker-compose
      run: |
        sudo apt-get update
        sudo apt-get install -y docker-compose
        docker-compose --version

    - name: Compiler le backend avec Maven
      run: |
        cd springboot/app
        chmod +x mvnw
        ./mvnw clean package -DskipTests

    - name: Login Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build et push Backend
      uses: docker/build-push-action@v4
      with:
        context: ./springboot/app
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-backend:latest

    - name: Build et push Frontend
      uses: docker/build-push-action@v4
      with:
        context: ./angular-app
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-frontend:latest

    - name: Confirmation
      run: echo "Build et push réussis !"
