name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupération du code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Installer Java pour Spring Boot
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      # 3. Build backend avec Maven
      - name: Build backend with Maven
        run: |
          cd springboot/app
          mvn clean package -DskipTests

      # 4. Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 6. Build & push backend image
      - name: Build & Push backend image
        run: docker buildx build --push \
              --tag ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest \
              ./springboot/app

      # 7. Build & push frontend image
      - name: Build & Push frontend image
        run: docker buildx build --push \
              --tag ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest \
              ./angular-app

      # 8. (Optionnel) Lancer docker-compose si nécessaire
      - name: Run Docker Compose
        run: docker compose up -d
