name: CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn -B package --file springboot/app/pom.xml -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        run: |
          docker build -t spring-app -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest ./springboot/app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest

      - name: Build and Push Frontend
        run: |
          docker build -t angular-app -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      # --- CORRECTION ICI (Espace au lieu de tiret) ---
      - name: Run Docker Compose
        run: docker compose up -d

      - name: Check Containers
        run: docker ps
